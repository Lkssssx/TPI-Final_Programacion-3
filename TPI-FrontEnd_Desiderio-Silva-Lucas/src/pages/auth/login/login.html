<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="icon" type="image/png" href="../../../icon.png">
    <link rel="stylesheet" href="/src/css/base.css">
    <link rel="stylesheet" href="/src/css/auth.css">
</head>

<body>
    <main>
        <div class="usuarios">
            <p><strong>Admin:</strong> admin@admin.com / 123456</p>
            <p><strong>Cliente:</strong> cliente@food.com / cliente123</p>
        </div>
        <div class="container">
            <form class="login-form">
                <h1>FOOD STORE</h1>
                <h2>Iniciar Sesión</h2>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required>

                <button type="submit">INGRESAR</button>

                <span class="error-mensaje result"></span>
                <p class="registro">
                    ¿No tenés cuenta? <a href="../register/register.html">Registrate acá</a>
                </p>
            </form>
        </div>
    </main>
    <script src="./login.ts" type="module"></script>
</body>

</html>
